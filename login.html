<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Style Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        // Redirect to index if already logged in
        if (localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-icon">👗✨👔</div>
            <h1>Welcome Back</h1>
            <p>Log in to access your saved style recommendations</p>
        </header>

        <!-- Dynamic Alert Box -->
        <div id="alert-message" class="alert-box"></div>

        <div class="auth-toggle">
            <button class="auth-tab active" id="tab-login">Login</button>
            <button class="auth-tab" id="tab-signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password')">👁️</button>
                </div>
            </div>

            <button type="submit" class="submit-btn" style="margin-top: 25px;">Sign In</button>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signup-form" class="hidden">
            <div class="form-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" placeholder="Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="signup-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('signup-password')">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="signup-confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="signup-confirm-password" placeholder="Repeat your password" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('signup-confirm-password')">👁️</button>
                </div>
            </div>

            <button type="submit" class="submit-btn" style="margin-top: 25px;">Create Account</button>
        </form>


    </div>

    <!-- JavaScript Authentication Logic -->
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const headerTitle = document.querySelector('header h1');
        const headerP = document.querySelector('header p');
        const alertBox = document.getElementById('alert-message');

        // Toggle UI
        function switchTab(isLogin) {
            alertBox.style.display = 'none'; // Clear alerts on switch
            if (isLogin) {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                headerTitle.textContent = "Welcome Back";
                headerP.textContent = "Log in to access your saved style recommendations";
            } else {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                headerTitle.textContent = "Create an Account";
                headerP.textContent = "Join us to discover your perfect color palette";
            }
        }

        tabLogin.addEventListener('click', () => switchTab(true));
        tabSignup.addEventListener('click', () => switchTab(false));

        // Display Alerts
        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = `alert-box alert-${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
        }

        // Toggle Password Visibility
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        // INIT: Create the database array in localStorage if it doesn't exist
        if (!localStorage.getItem('usersDB')) {
            localStorage.setItem('usersDB', JSON.stringify([]));
        }

        // --- SIGNUP LOGIC ---
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;
            const confirmPass = document.getElementById('signup-confirm-password').value;

            // Simple validation
            if (!name || !email || !pass || !confirmPass) {
                showAlert("Please fill in all fields.", "error");
                return;
            }

            if (pass !== confirmPass) {
                showAlert("Passwords do not match!", "error");
                return;
            }

            // Retrieve Users DB
            const users = JSON.parse(localStorage.getItem('usersDB'));

            // Check if email already exists
            const userExists = users.find(u => u.email === email);
            if (userExists) {
                showAlert("An account with this email already exists! Please log in.", "error");
                return;
            }

            // Save new user
            users.push({ name: name, email: email, password: pass });
            localStorage.setItem('usersDB', JSON.stringify(users));

            // Success
            signupForm.reset();
            showAlert("Account created successfully! Please log in.", "success");
            switchTab(true); // Auto switch to login
        });

        // --- LOGIN LOGIC ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;

            if (!email || !pass) {
                showAlert("Please enter both email and password.", "error");
                return;
            }

            // Retrieve Users DB
            const users = JSON.parse(localStorage.getItem('usersDB'));

            // Find user
            const user = users.find(u => u.email === email);

            if (!user) {
                showAlert("User does not exist. Please sign up first.", "error");
                return;
            }

            if (user.password !== pass) {
                showAlert("Incorrect password. Please try again.", "error");
                return;
            }

            // Login Success
            showAlert(`Welcome back, ${user.name}! Redirecting...`, "success");
            
            // Redirect after a brief moment
            setTimeout(() => {
                // In a real app we'd set a session token here
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>
</html>
